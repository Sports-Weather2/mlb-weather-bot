name: High Risk Weather Alerts
# Cache refresh - 3/21/26 - Force schedule to work automatically

on:
  schedule:
    # Runs at both 17:00 UTC and 18:00 UTC - whichever matches 10 AM PT will execute
    # During PDT (Mar-Nov): 17:00 UTC = 10 AM PT ✅
    # During PST (Nov-Mar): 18:00 UTC = 10 AM PT ✅
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  high-risk-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Check if it's 10 AM Pacific Time
        id: check_time
        run: |
          HOUR=$(TZ='America/Los_Angeles' date +%H)
          echo "should_run=false" >> $GITHUB_OUTPUT
          if [ "$HOUR" -eq "10" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ It's 10 AM PT - proceeding"
          else
            echo "📅 Not 10 AM PT (currently $HOUR:00) - skipping"
          fi
      
      - name: Update game schedule
        if: steps.check_time.outputs.should_run == 'true'
        run: python update_schedule.py
      
      - name: Send High-risk alerts
        if: steps.check_time.outputs.should_run == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.HIGH_RISK_WEBHOOK_URL }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python high_risk_alert.py
