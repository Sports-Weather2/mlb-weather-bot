name: High Risk Weather Alerts

on:
  schedule:
    # Runs at 7 AM, 10 AM, 1 PM, 4 PM, 7 PM PT (DST)
    - cron: '0 14,17,20,23,2 * * *'
  workflow_dispatch:

jobs:
  high-risk-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Update game schedule
        run: python update_schedule.py
      
      - name: Send high-risk alerts
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python high_risk_alert.py
