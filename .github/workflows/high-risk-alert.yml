name: High Risk Weather Alerts

on:
  schedule:
    # Morning report at 7 AM PT (14:00 UTC) - always posts
    - cron: '0 14 * * *'
    # Live monitoring every 15 minutes during typical game hours (12pm-2am PT / 19:00-09:00 UTC)
    - cron: '*/15 19-23,0-9 * * *'
  workflow_dispatch:

jobs:
  high-risk-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update game schedule
        run: python update_schedule.py

      - name: Check if morning report
        id: check_time
        run: |
          current_hour=$(date -u +%H)
          if [ "$current_hour" == "14" ]; then
            echo "mode=daily" >> $GITHUB_OUTPUT
          else
            echo "mode=monitor" >> $GITHUB_OUTPUT
          fi

      - name: Send high-risk alerts
        env:
          SLACK_WEBHOOK: ${{ secrets.HIGH_RISK_WEBHOOK_URL }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          ALERT_MODE: ${{ steps.check_time.outputs.mode }}
        run: python high_risk_alert.py
